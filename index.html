<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東京公社住宅サービス 書籍管理</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .book-card:active { transform: scale(0.98); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-8 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyBoTsM4_uPCEq272h7oasm-Ekh362AbRlY",
            authDomain: "books-e26df.firebaseapp.com",
            projectId: "books-e26df",
            storageBucket: "books-e26df.firebasestorage.app",
            messagingSenderId: "845254386506",
            appId: "1:845254386506:web:8cc62a5515319c6b5d17b3"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        function App() {
            const [books, setBooks] = useState([]);
            const [newBook, setNewBook] = useState({ title: '', author: '', isbn: '', thumbnail: '', description: '' });
            const [isScanning, setIsScanning] = useState(false);
            const [msg, setMsg] = useState("");
            const [expandedId, setExpandedId] = useState(null);

            useEffect(() => {
                const unsubscribe = db.collection("books").orderBy("updatedAt", "desc").onSnapshot(s => {
                    const loadedBooks = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    setBooks(loadedBooks);
                    
                    // 既存データの中で、画像または詳細が欠けているものを自動修復する
                    loadedBooks.forEach(book => {
                        if (book.isbn && (!book.thumbnail || !book.description)) {
                            autoRepairBook(book);
                        }
                    });
                });
                return () => unsubscribe();
            }, []);

            // 外部ソースからの画像補完用URL生成
            const getAlternativeThumbnail = (isbn) => {
                if (!isbn) return "";
                const clean = isbn.replace(/\D/g, "");
                return `https://v3.books.or.jp/api/v1/image/isbn/${clean}`;
            };

            // 既存データの自動修復ロジック
            const autoRepairBook = async (book) => {
                const cleanIsbn = book.isbn.replace(/\D/g, "");
                if (cleanIsbn.length < 10) return;

                try {
                    // OpenBD
                    const res = await fetch(`https://api.openbd.jp/v1/get?isbn=${cleanIsbn}`);
                    const data = await res.json();
                    
                    let updateData = {};

                    if (data && data.length > 0 && data[0] !== null) {
                        const sum = data[0].summary;
                        const detail = data[0].onix?.CollateralDetail?.TextContent?.[0]?.Text || "";
                        if (!book.thumbnail) updateData.thumbnail = sum.cover || getAlternativeThumbnail(cleanIsbn);
                        if (!book.description) updateData.description = detail || "";
                    } else {
                        // Google Books
                        const gbRes = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${cleanIsbn}`);
                        const gbData = await gbRes.json();
                        if (gbData.items && gbData.items.length > 0) {
                            const info = gbData.items[0].volumeInfo;
                            if (!book.thumbnail) updateData.thumbnail = info.imageLinks?.thumbnail?.replace('http:', 'https:') || getAlternativeThumbnail(cleanIsbn);
                            if (!book.description) updateData.description = info.description || "";
                        }
                    }

                    // 何かしら補完できるデータがあれば更新
                    if (Object.keys(updateData).length > 0) {
                        await db.collection("books").doc(book.id).update(updateData);
                    }
                } catch (e) {
                    console.error("Auto repair failed for", book.title, e);
                }
            };

            const fetchBookInfo = async (isbn) => {
                const cleanIsbn = isbn.replace(/\D/g, "");
                if (cleanIsbn.length < 10) {
                    setMsg("ISBNは10桁または13桁の数字です");
                    return;
                }
                setMsg("データベースを検索中...");
                try {
                    const openBdRes = await fetch(`https://api.openbd.jp/v1/get?isbn=${cleanIsbn}`);
                    const openBdData = await openBdRes.json();
                    if (openBdData && openBdData.length > 0 && openBdData[0] !== null) {
                        const sum = openBdData[0].summary;
                        const detail = openBdData[0].onix?.CollateralDetail?.TextContent?.[0]?.Text || "";
                        setNewBook({
                            title: sum.title || "",
                            author: sum.author || "",
                            isbn: cleanIsbn,
                            thumbnail: sum.cover || getAlternativeThumbnail(cleanIsbn),
                            description: detail || "内容紹介はありません。"
                        });
                        setMsg(`「${sum.title}」を取得しました`);
                        return;
                    }
                    let gbRes = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${cleanIsbn}`);
                    let gbData = await gbRes.json();
                    if (!gbData.items || gbData.items.length === 0) {
                        gbRes = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${cleanIsbn}`);
                        gbData = await gbRes.json();
                    }
                    if (gbData.items && gbData.items.length > 0) {
                        const info = gbData.items[0].volumeInfo;
                        setNewBook({
                            title: info.title || "",
                            author: info.authors ? info.authors.join(", ") : "",
                            isbn: cleanIsbn,
                            thumbnail: info.imageLinks?.thumbnail?.replace('http:', 'https:') || getAlternativeThumbnail(cleanIsbn),
                            description: info.description || "内容紹介はありません。"
                        });
                        setMsg(`「${info.title}」を取得しました`);
                        return;
                    }
                    setMsg("データが見つかりませんでした。画像のみ補完を試みます。");
                    setNewBook(p => ({ ...p, isbn: cleanIsbn, thumbnail: getAlternativeThumbnail(cleanIsbn), description: '' }));
                } catch (err) {
                    setMsg("通信エラーが発生しました。");
                }
            };

            const startScanner = () => {
                setIsScanning(true);
                setMsg("");
                setTimeout(() => {
                    const scanner = new Html5Qrcode("reader");
                    scanner.start(
                        { facingMode: "environment" },
                        { fps: 15, qrbox: { width: 280, height: 160 } },
                        (text) => {
                            if (text.startsWith("978") && text.length === 13) {
                                scanner.stop().then(() => {
                                    setIsScanning(false);
                                    setNewBook(p => ({ ...p, isbn: text }));
                                    fetchBookInfo(text);
                                });
                            }
                        },
                        () => {}
                    ).catch(() => setIsScanning(false));
                }, 200);
            };

            const handleAdd = async (e) => {
                e.preventDefault();
                if (!newBook.title) return;
                await db.collection("books").add({
                    ...newBook,
                    status: 'available',
                    borrower: '',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                setNewBook({ title: '', author: '', isbn: '', thumbnail: '', description: '' });
                setMsg("登録完了しました！");
            };

            const toggleStatus = async (book) => {
                const ref = db.collection("books").doc(book.id);
                if (book.status === 'available') {
                    const name = prompt("お名前を入力してください");
                    if (name) await ref.update({ status: 'borrowed', borrower: name, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                } else {
                    if (confirm("返却しますか？")) await ref.update({ status: 'available', borrower: '', updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                }
            };

            const deleteBook = async (id, title) => {
                if (confirm(`「${title}」をリストから完全に削除しますか？`)) {
                    await db.collection("books").doc(id).delete();
                    setMsg("削除しました。");
                }
            };

            return (
                <div className="max-w-md mx-auto p-2 pb-20">
                    <h1 className="text-xl font-bold mb-4 bg-blue-700 text-white p-4 rounded shadow-lg text-center">
                        東京公社住宅サービス<br/><span className="text-sm font-normal">書籍管理システム</span>
                    </h1>
                    
                    <div className="bg-white p-4 rounded shadow mb-4 border-t-4 border-blue-500">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="font-bold text-gray-700">📖 新しい本を登録</h2>
                            <button onClick={startScanner} className="bg-orange-500 text-white px-4 py-2 rounded-full text-sm font-bold shadow flex items-center gap-1">
                                <span>📷</span> スキャン
                            </button>
                        </div>

                        {isScanning && (
                            <div className="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center p-4 text-center">
                                <div id="reader" className="w-full max-w-sm bg-white rounded overflow-hidden border-4 border-white"></div>
                                <button onClick={() => location.reload()} className="mt-8 bg-white px-10 py-3 rounded-full font-bold">閉じる</button>
                                <p className="text-white mt-4 font-bold">ISBNバーコードを枠内へ</p>
                            </div>
                        )}

                        <form onSubmit={handleAdd} className="space-y-3">
                            <div className="flex gap-2">
                                <input className="flex-1 border p-2 rounded text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-400 outline-none" placeholder="ISBN (13桁)" value={newBook.isbn} 
                                    onChange={e => {
                                        const v = e.target.value;
                                        setNewBook({...newBook, isbn: v});
                                        if(v.replace(/\D/g, "").length === 13) fetchBookInfo(v);
                                    }} 
                                />
                                <button type="button" onClick={() => fetchBookInfo(newBook.isbn)} className="bg-blue-100 text-blue-700 px-4 py-2 rounded font-bold text-sm">検索</button>
                            </div>
                            
                            {newBook.thumbnail && (
                                <div className="flex justify-center p-3 bg-gray-50 rounded border border-dashed border-gray-300">
                                    <div className="text-center">
                                        <img src={newBook.thumbnail} alt="cover" className="h-40 shadow-xl rounded mx-auto mb-1" onError={(e)=>{e.target.style.display='none'}} />
                                        <p className="text-[10px] text-gray-400 italic">プレビュー画像</p>
                                    </div>
                                </div>
                            )}

                            <input className="w-full border p-2 rounded text-sm focus:ring-2 focus:ring-blue-400 outline-none" placeholder="書籍タイトル" value={newBook.title} onChange={e => setNewBook({...newBook, title: e.target.value})} required />
                            <input className="w-full border p-2 rounded text-sm focus:ring-2 focus:ring-blue-400 outline-none" placeholder="著者名" value={newBook.author} onChange={e => setNewBook({...newBook, author: e.target.value})} />
                            
                            {msg && <p className="text-xs text-blue-600 font-bold bg-blue-50 p-2 rounded border border-blue-100">{msg}</p>}
                            <button className="w-full bg-blue-700 text-white py-3 rounded font-bold shadow-lg active:bg-blue-800">リストに追加する</button>
                        </form>
                    </div>

                    <div className="space-y-3">
                        {books.map(book => (
                            <div key={book.id} className="bg-white rounded shadow-sm border border-gray-200 overflow-hidden transition-all book-card">
                                <div className="p-3 flex justify-between items-start gap-3 cursor-pointer" onClick={() => setExpandedId(expandedId === book.id ? null : book.id)}>
                                    <div className="flex gap-3 overflow-hidden flex-1">
                                        <div className="w-14 h-20 bg-gray-100 rounded shadow-inner flex-shrink-0 overflow-hidden border border-gray-100 flex items-center justify-center">
                                            {book.thumbnail ? (
                                                <img src={book.thumbnail} className="w-full h-full object-cover" alt="thumb" onError={(e)=>{e.target.src='https://placehold.jp/24/cccccc/ffffff/150x200.png?text=No%20Image'}} />
                                            ) : (
                                                <span className="text-[10px] text-gray-400">Loading...</span>
                                            )}
                                        </div>
                                        <div className="overflow-hidden flex flex-col justify-center">
                                            <div className="font-bold text-sm text-gray-800 leading-tight mb-1">{book.title}</div>
                                            <div className="text-xs text-gray-500 truncate">{book.author}</div>
                                            {book.borrower && (
                                                <div className="inline-flex items-center text-[10px] text-red-600 font-bold mt-2 bg-red-50 px-2 py-0.5 rounded border border-red-100 w-fit">
                                                    👤 借用中: {book.borrower}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    <div className="flex flex-col items-end gap-3 flex-shrink-0">
                                        <div className="flex items-center gap-1">
                                            <button onClick={(e) => { e.stopPropagation(); deleteBook(book.id, book.title); }} className="text-gray-300 hover:text-red-500 p-2 text-lg">🗑️</button>
                                            <button onClick={(e) => { e.stopPropagation(); toggleStatus(book); }} className={`text-[10px] w-14 py-2 rounded font-bold shadow-sm ${book.status === 'available' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-500 border'}`}>
                                                {book.status === 'available' ? '借りる' : '返却'}
                                            </button>
                                        </div>
                                        <span className="text-[10px] font-bold text-blue-500">{expandedId === book.id ? '▲ 閉じる' : '▼ 詳細・内容'}</span>
                                    </div>
                                </div>
                                
                                {expandedId === book.id && (
                                    <div className="p-4 border-t bg-blue-50 text-xs leading-relaxed text-gray-700 animate-in slide-in-from-top-2 duration-300">
                                        <div className="flex flex-col md:flex-row gap-4 italic mb-2 border-b border-blue-100 pb-2">
                                            <span className="font-bold">ISBN: {book.isbn}</span>
                                        </div>
                                        <div className="font-bold mb-2 text-blue-800 flex items-center gap-1">
                                            <span>📄</span> 内容ダイジェスト
                                        </div>
                                        <div className="bg-white p-3 rounded border border-blue-100 shadow-sm whitespace-pre-wrap">
                                            {book.description || "この書籍の紹介文は登録されていません。"}
                                        </div>
                                        {book.thumbnail && (
                                            <div className="mt-4 flex justify-center">
                                                <img src={book.thumbnail} className="max-w-[150px] shadow-lg rounded border-2 border-white" alt="Large" />
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
