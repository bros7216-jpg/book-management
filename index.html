<script type="text/babel">
        // Firebase設定 (既存のものをそのまま使用)
        const firebaseConfig = {
            apiKey: "AIzaSyBoTsM4_uPCEq272h7oasm-Ekh362AbRlY",
            authDomain: "books-e26df.firebaseapp.com",
            projectId: "books-e26df",
            storageBucket: "books-e26df.firebasestorage.app",
            messagingSenderId: "845254386506",
            appId: "1:845254386506:web:8cc62a5515319c6b5d17b3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        function App() {
            const [books, setBooks] = useState([]);
            const [newBook, setNewBook] = useState({ title: '', author: '', isbn: '' });
            const [isScanning, setIsScanning] = useState(false);

            useEffect(() => {
                const unsubscribe = db.collection("books").onSnapshot((querySnapshot) => {
                    const booksArr = [];
                    querySnapshot.forEach((doc) => {
                        booksArr.push({ ...doc.data(), id: doc.id });
                    });
                    setBooks(booksArr);
                });
                return () => unsubscribe();
            }, []);

            // 書籍検索ロジック (手入力・スキャン共通)
            const fetchBookInfo = async (targetIsbn) => {
                const cleanIsbn = targetIsbn.replace(/\D/g, ""); // 数字以外を削除
                if (cleanIsbn.length < 10) return; // 短すぎる場合は無視

                try {
                    const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${cleanIsbn}`);
                    const data = await response.json();
                    
                    if (data.items && data.items.length > 0) {
                        const info = data.items[0].volumeInfo;
                        setNewBook({
                            title: info.title || '',
                            author: info.authors ? info.authors.join(', ') : '',
                            isbn: cleanIsbn
                        });
                        alert(`「${info.title}」が見つかりました`);
                    } else {
                        alert("Google Booksに情報がありませんでした。タイトルを手入力してください。");
                    }
                } catch (error) {
                    console.error("API Error:", error);
                }
            };

            // 手入力欄の変更監視
            const handleIsbnChange = (e) => {
                const val = e.target.value;
                setNewBook({...newBook, isbn: val});
                
                // 13桁入力されたら自動で検索を実行
                const clean = val.replace(/\D/g, "");
                if (clean.length === 13) {
                    fetchBookInfo(clean);
                }
            };

            const startScanner = () => {
                setIsScanning(true);
                setTimeout(() => {
                    const html5QrCode = new Html5Qrcode("reader");
                    html5QrCode.start(
                        { facingMode: "environment" }, 
                        { fps: 10, qrbox: { width: 250, height: 150 } },
                        (decodedText) => {
                            if (decodedText.startsWith("978") || decodedText.startsWith("979")) {
                                html5QrCode.stop().then(() => {
                                    setIsScanning(false);
                                    fetchBookInfo(decodedText);
                                });
                            }
                        },
                        (errorMessage) => {}
                    );
                }, 100);
            };

            const handleAddBook = async (e) => {
                e.preventDefault();
                if (!newBook.title) {
                    alert("タイトルを入力してください");
                    return;
                }
                await db.collection("books").add({
                    ...newBook,
                    status: 'available',
                    borrower: '',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                setNewBook({ title: '', author: '', isbn: '' });
                alert("登録しました！");
            };

            const toggleBorrow = async (book) => {
                const bookRef = db.collection("books").doc(book.id);
                if (book.status === 'available') {
                    const name = prompt("借用者の名前を入力してください");
                    if (!name) return;
                    await bookRef.update({ status: 'borrowed', borrower: name, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                } else {
                    if (confirm("返却しますか？")) {
                        await bookRef.update({ status: 'available', borrower: '', updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    }
                }
            };

            return (
                <div className="max-w-4xl mx-auto">
                    <h1 className="text-2xl font-bold border-b-4 border-blue-500 pb-2 mb-6 text-gray-800">社内書籍管理システム</h1>

                    <div className="bg-white p-6 rounded-lg shadow-md mb-8 border-t-4 border-orange-400">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-bold text-gray-700 text-lg">📖 新規登録</h3>
                            <button onClick={startScanner} className="bg-orange-500 text-white px-4 py-2 rounded shadow hover:bg-orange-600 font-bold">
                                📷 バーコードをスキャン
                            </button>
                        </div>

                        {isScanning && (
                            <div className="fixed inset-0 bg-black bg-opacity-80 flex flex-col items-center justify-center z-50 p-4">
                                <div id="reader" className="w-full max-w-sm bg-white rounded-lg overflow-hidden"></div>
                                <button onClick={() => setIsScanning(false)} className="mt-6 bg-white px-8 py-2 rounded-full font-bold">キャンセル</button>
                            </div>
                        )}

                        <form onSubmit={handleAddBook} className="space-y-4">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="flex gap-2 items-end">
                                    <div className="flex-1">
                                        <label className="text-xs text-gray-500 ml-1">ISBN (13桁)</label>
                                        <input className="w-full border p-2 rounded bg-gray-50" placeholder="978..." value={newBook.isbn} onChange={handleIsbnChange} />
                                    </div>
                                    <button type="button" onClick={() => fetchBookInfo(newBook.isbn)} className="bg-gray-200 px-3 py-2 rounded text-sm hover:bg-gray-300">検索</button>
                                </div>
                                <div>
                                    <label className="text-xs text-gray-500 ml-1">タイトル</label>
                                    <input className="w-full border p-2 rounded" placeholder="自動入力または手入力" value={newBook.title} onChange={e => setNewBook({...newBook, title: e.target.value})} required />
                                </div>
                                <div>
                                    <label className="text-xs text-gray-500 ml-1">著者</label>
                                    <input className="w-full border p-2 rounded" placeholder="自動入力または手入力" value={newBook.author} onChange={e => setNewBook({...newBook, author: e.target.value})} />
                                </div>
                            </div>
                            <button type="submit" className="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700 font-bold text-lg shadow-lg transition">登録する</button>
                        </form>
                    </div>

                    {/* 一覧表示部分は以前と同様 */}
                    <div className="bg-white rounded-lg shadow-md overflow-hidden">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="bg-blue-50 text-sm">
                                    <th className="p-4 border-b">タイトル / 著者</th>
                                    <th className="p-4 border-b">状態</th>
                                    <th className="p-4 border-b">借用者</th>
                                    <th className="p-4 border-b text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {books.map(book => (
                                    <tr key={book.id} className="hover:bg-gray-50 border-b">
                                        <td className="p-4">
                                            <div className="font-bold">{book.title}</div>
                                            <div className="text-xs text-gray-500">{book.author}</div>
                                        </td>
                                        <td className="p-4">
                                            <span className={`px-2 py-1 rounded text-xs font-bold ${book.status === 'available' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                {book.status === 'available' ? '貸出可' : '貸出中'}
                                            </span>
                                        </td>
                                        <td className="p-4 text-sm text-gray-600">{book.borrower || '-'}</td>
                                        <td className="p-4 text-center">
                                            <button onClick={() => toggleBorrow(book)} className="bg-gray-100 border px-3 py-1 rounded hover:bg-gray-200 text-sm">
                                                {book.status === 'available' ? '借りる' : '返却'}
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
