<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社内書籍管理システム - スキャン機能付</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-50 p-4 md:p-8 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        // 1. Firebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyBoTsM4_uPCEq272h7oasm-Ekh362AbRlY",
            authDomain: "books-e26df.firebaseapp.com",
            projectId: "books-e26df",
            storageBucket: "books-e26df.firebasestorage.app",
            messagingSenderId: "845254386506",
            appId: "1:845254386506:web:8cc62a5515319c6b5d17b3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        function App() {
            const [books, setBooks] = useState([]);
            const [newBook, setNewBook] = useState({ title: '', author: '', isbn: '' });
            const [isScanning, setIsScanning] = useState(false);

            // リアルタイムデータ取得
            useEffect(() => {
                const unsubscribe = db.collection("books").onSnapshot((querySnapshot) => {
                    const booksArr = [];
                    querySnapshot.forEach((doc) => {
                        booksArr.push({ ...doc.data(), id: doc.id });
                    });
                    setBooks(booksArr);
                });
                return () => unsubscribe();
            }, []);

            // 【強化版】Google Books APIで書籍情報を検索
            const fetchBookInfo = async (isbn) => {
                try {
                    // 数字以外（ハイフンなど）を除去
                    const cleanIsbn = isbn.replace(/\D/g, "");
                    const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${cleanIsbn}`);
                    const data = await response.json();
                    
                    if (data.items && data.items.length > 0) {
                        const info = data.items[0].volumeInfo;
                        setNewBook({
                            title: info.title || 'タイトル不明',
                            author: info.authors ? info.authors.join(', ') : '著者不明',
                            isbn: cleanIsbn
                        });
                        alert(`「${info.title}」の情報を取得しました。`);
                    } else {
                        // ヒットしなかった場合
                        alert("書籍情報が見つかりませんでした。タイトルと著者を手入力してください。");
                        setNewBook({ title: '', author: '', isbn: cleanIsbn });
                    }
                } catch (error) {
                    console.error("API Error:", error);
                    alert("通信エラーが発生しました。");
                }
            };

            // スキャナーの起動
            const startScanner = () => {
                setIsScanning(true);
                setTimeout(() => {
                    const html5QrCode = new Html5Qrcode("reader");
                    const config = { 
                        fps: 10, 
                        qrbox: { width: 280, height: 150 }, // 横長バーコードに最適化
                        aspectRatio: 1.0
                    };

                    html5QrCode.start(
                        { facingMode: "environment" }, 
                        config,
                        (decodedText) => {
                            // 978（日本の書籍）で始まる13桁をキャッチ
                            if (decodedText.startsWith("978") || decodedText.startsWith("979")) {
                                html5QrCode.stop().then(() => {
                                    setIsScanning(false);
                                    fetchBookInfo(decodedText);
                                });
                            }
                        },
                        (errorMessage) => {}
                    ).catch(err => {
                        console.error(err);
                        setIsScanning(false);
                    });
                }, 100);
            };

            // 書籍登録
            const handleAddBook = async (e) => {
                e.preventDefault();
                if (!newBook.title) return;
                try {
                    await db.collection("books").add({
                        ...newBook,
                        status: 'available',
                        borrower: '',
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setNewBook({ title: '', author: '', isbn: '' });
                    alert("登録が完了しました！");
                } catch (error) {
                    alert("登録エラー: " + error.message);
                }
            };

            // 貸出・返却
            const toggleBorrow = async (book) => {
                const bookRef = db.collection("books").doc(book.id);
                if (book.status === 'available') {
                    const name = prompt("借用者の名前を入力してください");
                    if (!name) return;
                    await bookRef.update({
                        status: 'borrowed',
                        borrower: name,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } else {
                    if (confirm("返却処理をしますか？")) {
                        await bookRef.update({
                            status: 'available',
                            borrower: '',
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                }
            };

            return (
                <div className="max-w-4xl mx-auto">
                    <h1 className="text-2xl font-bold border-b-4 border-blue-500 pb-2 mb-6 text-gray-800 font-sans">社内書籍管理システム</h1>

                    <div className="bg-white p-6 rounded-lg shadow-md mb-8">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-bold text-gray-700 font-sans text-lg">📖 書籍登録</h3>
                            <button 
                                onClick={startScanner}
                                className="bg-orange-500 text-white px-4 py-2 rounded shadow hover:bg-orange-600 font-bold flex items-center gap-2"
                            >
                                <span>📷</span> スキャンして検索
                            </button>
                        </div>

                        {isScanning && (
                            <div className="fixed inset-0 bg-black bg-opacity-80 flex flex-col items-center justify-center z-50 p-4">
                                <div id="reader" className="w-full max-w-sm bg-white rounded-lg overflow-hidden border-4 border-orange-500"></div>
                                <button 
                                    onClick={() => window.location.reload()} 
                                    className="mt-6 bg-white px-8 py-2 rounded-full font-bold text-gray-800"
                                >
                                    キャンセル
                                </button>
                                <p className="text-white mt-4 text-sm">「978」から始まるバーコードを枠に入れてください</p>
                            </div>
                        )}

                        <form onSubmit={handleAddBook} className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <input className="border p-2 rounded" placeholder="タイトル" value={newBook.title} onChange={e => setNewBook({...newBook, title: e.target.value})} required />
                            <input className="border p-2 rounded" placeholder="著者" value={newBook.author} onChange={e => setNewBook({...newBook, author: e.target.value})} />
                            <input className="border p-2 rounded" placeholder="ISBN (13桁)" value={newBook.isbn} onChange={e => setNewBook({...newBook, isbn: e.target.value})} />
                            <button type="submit" className="bg-blue-600 text-white p-2 rounded hover:bg-blue-700 font-bold transition">登録</button>
                        </form>
                    </div>

                    <div className="bg-white rounded-lg shadow-md overflow-hidden">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="bg-blue-50 text-sm font-sans">
                                    <th className="p-4 border-b">タイトル / 著者</th>
                                    <th className="p-4 border-b">状態</th>
                                    <th className="p-4 border-b">借用者</th>
                                    <th className="p-4 border-b text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {books.length > 0 ? books.map(book => (
                                    <tr key={book.id} className="hover:bg-gray-50 border-b transition">
                                        <td className="p-4">
                                            <div className="font-bold">{book.title}</div>
                                            <div className="text-xs text-gray-500">{book.author}</div>
                                        </td>
                                        <td className="p-4">
                                            <span className={`px-2 py-1 rounded text-xs font-bold ${book.status === 'available' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                {book.status === 'available' ? '貸出可' : '貸出中'}
                                            </span>
                                        </td>
                                        <td className="p-4 text-sm text-gray-600">{book.borrower || '-'}</td>
                                        <td className="p-4 text-center">
                                            <button onClick={() => toggleBorrow(book)} className="bg-white border-2 border-gray-200 px-4 py-1 rounded hover:bg-gray-100 text-sm font-bold transition">
                                                {book.status === 'available' ? '借りる' : '返却'}
                                            </button>
                                        </td>
                                    </tr>
                                )) : (
                                    <tr>
                                        <td colSpan="4" className="p-10 text-center text-gray-400">登録されている書籍がありません。</td>
                                    </tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
