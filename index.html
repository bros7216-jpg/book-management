<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社内書籍管理システム</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyBoTsM4_uPCEq272h7oasm-Ekh362AbRlY",
            authDomain: "books-e26df.firebaseapp.com",
            projectId: "books-e26df",
            storageBucket: "books-e26df.firebasestorage.app",
            messagingSenderId: "845254386506",
            appId: "1:845254386506:web:8cc62a5515319c6b5d17b3"
        };

        // 初期化
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        function App() {
            const [books, setBooks] = useState([]);
            const [newBook, setNewBook] = useState({ title: '', author: '', isbn: '' });
            const [isScanning, setIsScanning] = useState(false);

            useEffect(() => {
                const unsubscribe = db.collection("books")
                    .orderBy("updatedAt", "desc")
                    .onSnapshot((snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setBooks(data);
                    });
                return () => unsubscribe();
            }, []);

            // 書籍検索関数
            const fetchBookInfo = async (isbn) => {
                const cleanIsbn = isbn.replace(/\D/g, "");
                if (cleanIsbn.length !== 13) return;

                try {
                    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${cleanIsbn}`);
                    const data = await res.json();
                    if (data.items && data.items.length > 0) {
                        const info = data.items[0].volumeInfo;
                        setNewBook({
                            title: info.title || "",
                            author: info.authors ? info.authors.join(", ") : "",
                            isbn: cleanIsbn
                        });
                    } else {
                        alert("書籍情報が見つかりませんでした。手入力してください。");
                    }
                } catch (err) {
                    console.error(err);
                }
            };

            // ISBN入力時の処理
            const handleIsbnChange = (e) => {
                const val = e.target.value;
                setNewBook(prev => ({ ...prev, isbn: val }));
                if (val.replace(/\D/g, "").length === 13) {
                    fetchBookInfo(val);
                }
            };

            const startScanner = () => {
                setIsScanning(true);
                setTimeout(() => {
                    const scanner = new Html5Qrcode("reader");
                    scanner.start(
                        { facingMode: "environment" },
                        { fps: 10, qrbox: { width: 250, height: 150 } },
                        (text) => {
                            if (text.startsWith("978")) {
                                scanner.stop().then(() => {
                                    setIsScanning(false);
                                    fetchBookInfo(text);
                                });
                            }
                        },
                        () => {}
                    ).catch(() => setIsScanning(false));
                }, 100);
            };

            const handleAdd = async (e) => {
                e.preventDefault();
                if (!newBook.title) return;
                await db.collection("books").add({
                    ...newBook,
                    status: 'available',
                    borrower: '',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                setNewBook({ title: '', author: '', isbn: '' });
                alert("登録しました");
            };

            const toggleStatus = async (book) => {
                const ref = db.collection("books").doc(book.id);
                if (book.status === 'available') {
                    const name = prompt("借用者の名前を入力してください");
                    if (!name) return;
                    await ref.update({ status: 'borrowed', borrower: name, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                } else {
                    if (confirm("返却しますか？")) {
                        await ref.update({ status: 'available', borrower: '', updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    }
                }
            };

            return (
                <div className="max-w-2xl mx-auto p-2">
                    <h1 className="text-xl font-bold mb-4 border-l-4 border-blue-600 pl-2">書籍管理システム</h1>
                    
                    <div className="bg-white p-4 rounded shadow mb-6">
                        <div className="flex justify-between mb-4">
                            <h2 className="font-bold">新規登録</h2>
                            <button onClick={startScanner} className="bg-orange-500 text-white px-3 py-1 rounded text-sm font-bold">📷 スキャン</button>
                        </div>

                        {isScanning && (
                            <div className="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center p-4">
                                <div id="reader" className="w-full max-w-sm bg-white rounded"></div>
                                <button onClick={() => location.reload()} className="mt-4 bg-white px-6 py-2 rounded-full font-bold">閉じる</button>
                            </div>
                        )}

                        <form onSubmit={handleAdd} className="space-y-3">
                            <input className="w-full border p-2 rounded text-sm" placeholder="ISBN (13桁入力で自動検索)" value={newBook.isbn} onChange={handleIsbnChange} />
                            <input className="w-full border p-2 rounded text-sm" placeholder="タイトル" value={newBook.title} onChange={e => setNewBook({...newBook, title: e.target.value})} required />
                            <input className="w-full border p-2 rounded text-sm" placeholder="著者" value={newBook.author} onChange={e => setNewBook({...newBook, author: e.target.value})} />
                            <button className="w-full bg-blue-600 text-white py-2 rounded font-bold shadow">この内容で登録</button>
                        </form>
                    </div>

                    <div className="space-y-3">
                        {books.map(book => (
                            <div key={book.id} className="bg-white p-3 rounded shadow flex justify-between items-center">
                                <div className="flex-1 mr-2">
                                    <div className="font-bold text-sm">{book.title}</div>
                                    <div className="text-xs text-gray-500">{book.author}</div>
                                    {book.borrower && <div className="text-xs text-red-500 mt-1">借用中: {book.borrower}</div>}
                                </div>
                                <button onClick={() => toggleStatus(book)} className={`text-xs px-3 py-2 rounded font-bold ${book.status === 'available' ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-red-100 text-red-700 border border-red-200'}`}>
                                    {book.status === 'available' ? '借りる' : '返却'}
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
