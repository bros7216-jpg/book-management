<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東京公社住宅サービス 書籍管理</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-2 md:p-8 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyBoTsM4_uPCEq272h7oasm-Ekh362AbRlY",
            authDomain: "books-e26df.firebaseapp.com",
            projectId: "books-e26df",
            storageBucket: "books-e26df.firebasestorage.app",
            messagingSenderId: "845254386506",
            appId: "1:845254386506:web:8cc62a5515319c6b5d17b3"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        function App() {
            const [books, setBooks] = useState([]);
            const [newBook, setNewBook] = useState({ title: '', author: '', isbn: '', thumbnail: '', description: '' });
            const [isScanning, setIsScanning] = useState(false);
            const [msg, setMsg] = useState("");
            const [expandedId, setExpandedId] = useState(null); // ダイジェスト表示用

            useEffect(() => {
                const unsubscribe = db.collection("books").orderBy("updatedAt", "desc").onSnapshot(s => {
                    setBooks(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                return () => unsubscribe();
            }, []);

            const fetchBookInfo = async (isbn) => {
                const cleanIsbn = isbn.replace(/\D/g, "");
                if (cleanIsbn.length < 10) {
                    setMsg("ISBNは10桁または13桁の数字です");
                    return;
                }
                
                setMsg("データベースを検索中...");
                
                try {
                    // 1. OpenBD API
                    const openBdRes = await fetch(`https://api.openbd.jp/v1/get?isbn=${cleanIsbn}`);
                    const openBdData = await openBdRes.json();
                    
                    if (openBdData && openBdData.length > 0 && openBdData[0] !== null) {
                        const sum = openBdData[0].summary;
                        const detail = openBdData[0].onix?.CollateralDetail?.TextContent?.[0]?.Text || "";
                        setNewBook({
                            title: sum.title || "",
                            author: sum.author || "",
                            isbn: cleanIsbn,
                            thumbnail: sum.cover || "",
                            description: detail || "内容紹介はありません。"
                        });
                        setMsg(`「${sum.title}」を取得しました`);
                        return;
                    }

                    // 2. Google Books API
                    let gbRes = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${cleanIsbn}`);
                    let gbData = await gbRes.json();
                    
                    if (!gbData.items || gbData.items.length === 0) {
                        gbRes = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${cleanIsbn}`);
                        gbData = await gbRes.json();
                    }

                    if (gbData.items && gbData.items.length > 0) {
                        const info = gbData.items[0].volumeInfo;
                        setNewBook({
                            title: info.title || "",
                            author: info.authors ? info.authors.join(", ") : "",
                            isbn: cleanIsbn,
                            thumbnail: info.imageLinks?.thumbnail?.replace('http:', 'https:') || "",
                            description: info.description || "内容紹介はありません。"
                        });
                        setMsg(`「${info.title}」を取得しました`);
                        return;
                    }

                    setMsg("データが見つかりませんでした。手入力をお願いします。");
                    setNewBook(p => ({ ...p, isbn: cleanIsbn, thumbnail: '', description: '' }));

                } catch (err) {
                    setMsg("通信エラーが発生しました。");
                }
            };

            const startScanner = () => {
                setIsScanning(true);
                setMsg("");
                setTimeout(() => {
                    const scanner = new Html5Qrcode("reader");
                    scanner.start(
                        { facingMode: "environment" },
                        { fps: 15, qrbox: { width: 280, height: 160 } },
                        (text) => {
                            if (text.startsWith("978") && text.length === 13) {
                                scanner.stop().then(() => {
                                    setIsScanning(false);
                                    setNewBook(p => ({ ...p, isbn: text }));
                                    fetchBookInfo(text);
                                });
                            }
                        },
                        () => {}
                    ).catch(() => setIsScanning(false));
                }, 200);
            };

            const handleAdd = async (e) => {
                e.preventDefault();
                if (!newBook.title) return;
                await db.collection("books").add({
                    ...newBook,
                    status: 'available',
                    borrower: '',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                setNewBook({ title: '', author: '', isbn: '', thumbnail: '', description: '' });
                setMsg("登録完了しました！");
            };

            const toggleStatus = async (book) => {
                const ref = db.collection("books").doc(book.id);
                if (book.status === 'available') {
                    const name = prompt("お名前を入力してください");
                    if (name) await ref.update({ status: 'borrowed', borrower: name, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                } else {
                    if (confirm("返却しますか？")) await ref.update({ status: 'available', borrower: '', updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                }
            };

            const deleteBook = async (id, title) => {
                if (confirm(`「${title}」をリストから完全に削除しますか？`)) {
                    await db.collection("books").doc(id).delete();
                    setMsg("削除しました。");
                }
            };

            return (
                <div className="max-w-md mx-auto p-2 pb-20">
                    <h1 className="text-xl font-bold mb-4 bg-blue-600 text-white p-3 rounded shadow">東京公社住宅サービス　書籍管理</h1>
                    
                    <div className="bg-white p-4 rounded shadow mb-4 border-t-4 border-blue-500">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="font-bold text-gray-700">📖 本を登録</h2>
                            <button onClick={startScanner} className="bg-orange-500 text-white px-4 py-2 rounded-full text-sm font-bold shadow flex items-center gap-1">
                                <span>📷</span> スキャン
                            </button>
                        </div>

                        {isScanning && (
                            <div className="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center p-4 text-center">
                                <div id="reader" className="w-full max-w-sm bg-white rounded overflow-hidden"></div>
                                <button onClick={() => location.reload()} className="mt-8 bg-white px-10 py-3 rounded-full font-bold">閉じる</button>
                                <p className="text-white mt-4 font-bold">上のバーコード(978...)を枠へ</p>
                            </div>
                        )}

                        <form onSubmit={handleAdd} className="space-y-3">
                            <div className="flex gap-2">
                                <input className="flex-1 border p-2 rounded text-sm bg-gray-50" placeholder="ISBN" value={newBook.isbn} 
                                    onChange={e => {
                                        const v = e.target.value;
                                        setNewBook({...newBook, isbn: v});
                                        if(v.replace(/\D/g, "").length === 13) fetchBookInfo(v);
                                    }} 
                                />
                                <button type="button" onClick={() => fetchBookInfo(newBook.isbn)} className="bg-gray-200 px-4 py-2 rounded font-bold text-sm">検索</button>
                            </div>
                            
                            {newBook.thumbnail && (
                                <div className="flex justify-center py-2">
                                    <img src={newBook.thumbnail} alt="cover" className="h-32 shadow rounded" />
                                </div>
                            )}

                            <input className="w-full border p-2 rounded text-sm" placeholder="タイトル" value={newBook.title} onChange={e => setNewBook({...newBook, title: e.target.value})} required />
                            <input className="w-full border p-2 rounded text-sm" placeholder="著者" value={newBook.author} onChange={e => setNewBook({...newBook, author: e.target.value})} />
                            
                            {msg && <p className="text-xs text-blue-600 font-bold">{msg}</p>}
                            <button className="w-full bg-blue-700 text-white py-3 rounded font-bold shadow-lg">登録する</button>
                        </form>
                    </div>

                    <div className="space-y-3">
                        {books.map(book => (
                            <div key={book.id} className="bg-white rounded shadow border-l-4 border-blue-200 overflow-hidden transition-all">
                                <div className="p-3 flex justify-between items-center cursor-pointer" onClick={() => setExpandedId(expandedId === book.id ? null : book.id)}>
                                    <div className="flex items-center gap-3 overflow-hidden">
                                        {book.thumbnail ? (
                                            <img src={book.thumbnail} className="w-10 h-14 object-cover rounded shadow-sm flex-shrink-0" alt="thumb" />
                                        ) : (
                                            <div className="w-10 h-14 bg-gray-100 flex items-center justify-center text-[10px] text-gray-400 border rounded flex-shrink-0">No Image</div>
                                        )}
                                        <div className="overflow-hidden">
                                            <div className="font-bold text-sm truncate">{book.title}</div>
                                            <div className="text-xs text-gray-500 truncate">{book.author}</div>
                                            {book.borrower && <div className="text-[10px] text-red-500 font-bold mt-1">借用中: {book.borrower}</div>}
                                        </div>
                                    </div>
                                    <div className="flex flex-col items-end gap-2 ml-2">
                                        <div className="flex items-center gap-1">
                                            <button onClick={(e) => { e.stopPropagation(); deleteBook(book.id, book.title); }} className="text-gray-300 hover:text-red-500 p-1">🗑️</button>
                                            <button onClick={(e) => { e.stopPropagation(); toggleStatus(book); }} className={`text-[10px] w-14 py-2 rounded font-bold ${book.status === 'available' ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-700'}`}>
                                                {book.status === 'available' ? '借りる' : '返却'}
                                            </button>
                                        </div>
                                        <span className="text-[10px] text-gray-300">{expandedId === book.id ? '▲ 閉じる' : '▼ 詳細'}</span>
                                    </div>
                                </div>
                                
                                {expandedId === book.id && (
                                    <div className="p-3 border-t bg-gray-50 text-xs leading-relaxed text-gray-600 animate-in fade-in duration-300">
                                        <div className="font-bold mb-1 text-gray-700">【内容紹介】</div>
                                        {book.description || "紹介文はありません。"}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
