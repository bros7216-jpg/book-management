<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社内書籍管理システム</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-2 md:p-8 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyBoTsM4_uPCEq272h7oasm-Ekh362AbRlY",
            authDomain: "books-e26df.firebaseapp.com",
            projectId: "books-e26df",
            storageBucket: "books-e26df.firebasestorage.app",
            messagingSenderId: "845254386506",
            appId: "1:845254386506:web:8cc62a5515319c6b5d17b3"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        function App() {
            const [books, setBooks] = useState([]);
            const [newBook, setNewBook] = useState({ title: '', author: '', isbn: '' });
            const [isScanning, setIsScanning] = useState(false);
            const [msg, setMsg] = useState("");

            useEffect(() => {
                const unsubscribe = db.collection("books").orderBy("updatedAt", "desc").onSnapshot(s => {
                    setBooks(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                return () => unsubscribe();
            }, []);

            // 【超強化版】日本の書籍対応 API二段構え検索
            const fetchBookInfo = async (isbn) => {
                const cleanIsbn = isbn.replace(/\D/g, ""); // 数字以外を削除
                if (cleanIsbn.length < 10) {
                    setMsg("ISBNは10桁または13桁の数字です");
                    return;
                }
                
                setMsg("データベースを検索中...");
                
                try {
                    // 1. 日本の書籍に強い「OpenBD API」を検索
                    const openBdRes = await fetch(`https://api.openbd.jp/v1/get?isbn=${cleanIsbn}`);
                    const openBdData = await openBdRes.json();
                    
                    if (openBdData && openBdData.length > 0 && openBdData[0] !== null) {
                        const info = openBdData[0].summary;
                        setNewBook({
                            title: info.title || "",
                            author: info.author || "",
                            isbn: cleanIsbn
                        });
                        setMsg(`「${info.title}」を取得しました`);
                        return; // ここで見つかれば終了
                    }

                    // 2. 見つからなければ「Google Books API」を検索（洋書などに強い）
                    let gbRes = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${cleanIsbn}`);
                    let gbData = await gbRes.json();
                    
                    if (!gbData.items || gbData.items.length === 0) {
                        gbRes = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${cleanIsbn}`);
                        gbData = await gbRes.json();
                    }

                    if (gbData.items && gbData.items.length > 0) {
                        const info = gbData.items[0].volumeInfo;
                        setNewBook({
                            title: info.title || "",
                            author: info.authors ? info.authors.join(", ") : "",
                            isbn: cleanIsbn
                        });
                        setMsg(`「${info.title}」を取得しました`);
                        return; // ここで見つかれば終了
                    }

                    // 3. どちらにも無かった場合
                    setMsg("データが見つかりませんでした。手入力をお願いします。");
                    setNewBook(p => ({ ...p, isbn: cleanIsbn }));

                } catch (err) {
                    console.error(err);
                    setMsg("通信エラーが発生しました。");
                }
            };

            const startScanner = () => {
                setIsScanning(true);
                setMsg("");
                setTimeout(() => {
                    const scanner = new Html5Qrcode("reader");
                    scanner.start(
                        { facingMode: "environment" },
                        { fps: 15, qrbox: { width: 280, height: 160 } },
                        (text) => {
                            if (text.startsWith("978") && text.length === 13) {
                                scanner.stop().then(() => {
                                    setIsScanning(false);
                                    setNewBook(p => ({ ...p, isbn: text }));
                                    fetchBookInfo(text);
                                });
                            }
                        },
                        () => {}
                    ).catch(() => setIsScanning(false));
                }, 200);
            };

            const handleAdd = async (e) => {
                e.preventDefault();
                if (!newBook.title) return;
                await db.collection("books").add({
                    ...newBook,
                    status: 'available',
                    borrower: '',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                setNewBook({ title: '', author: '', isbn: '' });
                setMsg("登録完了しました！");
            };

            const toggleStatus = async (book) => {
                const ref = db.collection("books").doc(book.id);
                if (book.status === 'available') {
                    const name = prompt("お名前を入力してください");
                    if (name) await ref.update({ status: 'borrowed', borrower: name, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                } else {
                    if (confirm("返却しますか？")) await ref.update({ status: 'available', borrower: '', updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                }
            };

            return (
                <div className="max-w-md mx-auto p-2">
                    <h1 className="text-xl font-bold mb-4 bg-blue-600 text-white p-3 rounded shadow">社内書籍管理</h1>
                    
                    <div className="bg-white p-4 rounded shadow mb-4 border-t-4 border-blue-500">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="font-bold text-gray-700">📖 本を登録</h2>
                            <button onClick={startScanner} className="bg-orange-500 text-white px-4 py-2 rounded-full text-sm font-bold shadow flex items-center gap-1">
                                <span>📷</span> スキャン
                            </button>
                        </div>

                        {isScanning && (
                            <div className="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center p-4">
                                <div id="reader" className="w-full max-w-sm bg-white rounded overflow-hidden"></div>
                                <button onClick={() => location.reload()} className="mt-8 bg-white px-10 py-3 rounded-full font-bold text-lg">閉じる</button>
                                <p className="text-white mt-4 text-center font-bold">上のバーコード(978...)を枠へ</p>
                            </div>
                        )}

                        <form onSubmit={handleAdd} className="space-y-3">
                            <div>
                                <div className="flex gap-2">
                                    <input 
                                        className="flex-1 border p-2 rounded text-sm bg-gray-50" 
                                        placeholder="ISBN (ハイフンなし13桁)" 
                                        value={newBook.isbn} 
                                        onChange={e => {
                                            const v = e.target.value;
                                            setNewBook({...newBook, isbn: v});
                                            // 13桁入力されたら自動検索
                                            if(v.replace(/\D/g, "").length === 13) fetchBookInfo(v);
                                        }} 
                                    />
                                    <button 
                                        type="button" 
                                        onClick={() => fetchBookInfo(newBook.isbn)} 
                                        className="bg-gray-200 text-gray-700 px-4 py-2 rounded font-bold hover:bg-gray-300 transition"
                                    >
                                        検索
                                    </button>
                                </div>
                                {msg && <p className={`text-xs mt-2 font-bold ${msg.includes('取得') || msg.includes('完了') ? 'text-green-600' : 'text-blue-600'}`}>{msg}</p>}
                            </div>
                            <input className="w-full border p-2 rounded text-sm" placeholder="タイトル (必須)" value={newBook.title} onChange={e => setNewBook({...newBook, title: e.target.value})} required />
                            <input className="w-full border p-2 rounded text-sm" placeholder="著者" value={newBook.author} onChange={e => setNewBook({...newBook, author: e.target.value})} />
                            <button className="w-full bg-blue-700 text-white py-3 rounded font-bold shadow-lg mt-2">この内容で登録する</button>
                        </form>
                    </div>

                    <div className="space-y-2">
                        {books.map(book => (
                            <div key={book.id} className="bg-white p-3 rounded shadow border-l-4 border-blue-200 flex justify-between items-center">
                                <div className="overflow-hidden mr-2">
                                    <div className="font-bold text-sm truncate">{book.title}</div>
                                    <div className="text-xs text-gray-500 truncate">{book.author}</div>
                                    {book.borrower && <div className="text-[10px] text-red-500 font-bold mt-1">貸出中: {book.borrower}</div>}
                                </div>
                                <button onClick={() => toggleStatus(book)} className={`flex-shrink-0 text-xs px-3 py-2 rounded font-bold transition ${book.status === 'available' ? 'bg-green-500 text-white hover:bg-green-600' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}>
                                    {book.status === 'available' ? '借りる' : '返却'}
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
